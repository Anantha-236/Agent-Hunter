      - type: XSS-Reflected
        route: "GET /search"
        line: 33
        severity: HIGH

      - type: Command-Injection
        route: "POST /convert"
        line: 39
        severity: CRITICAL

      - type: Path-Traversal
        route: "GET /download"
        line: 46
        severity: HIGH

      - type: Eval-Usage
        route: "POST /calculate"
        line: 52
        severity: CRITICAL

      - type: Weak-Crypto
        function: "hashPassword"
