version: "3.8"

# ═══════════════════════════════════════════════════════════
#  Agent-Hunter — Docker Scanner Fleet
#  Scanners: ZAP (web) · Nmap (network) · Trivy (CVE) · Semgrep (SAST)
#  Orchestrator: FastAPI on :8888 — Agent-Hunter calls this
# ═══════════════════════════════════════════════════════════

networks:
  scanner-net:
    driver: bridge

volumes:
  results:
  zap-data:

services:

  # ─────────────────────────────────────────────
  # ORCHESTRATOR — Agent-Hunter calls this API
  # ─────────────────────────────────────────────
  orchestrator:
    build: ./orchestrator
    container_name: hunter-orchestrator
    ports:
      - "8888:8888"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock   # so it can spawn scanner containers
      - results:/results
      - ./orchestrator:/app
    environment:
      - RESULTS_DIR=/results
      - ZAP_HOST=zap
      - ZAP_PORT=8080
      - ZAP_API_KEY=hunter-zap-key
    networks:
      - scanner-net
    depends_on:
      - zap
    restart: unless-stopped
    labels:
      hunter.role: orchestrator

  # ─────────────────────────────────────────────
  # WEB SCANNER — OWASP ZAP
  # Handles: XSS, SQLi, CSRF, SSRF, open redirect
  # ─────────────────────────────────────────────
  zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    container_name: hunter-zap
    ports:
      - "8090:8080"
    volumes:
      - zap-data:/zap/wrk
      - results:/results
    command: >
      zap.sh -daemon
      -host 0.0.0.0
      -port 8080
      -config api.key=hunter-zap-key
      -config api.addrs.addr.name=.*
      -config api.addrs.addr.regex=true
      -config ajax.browserId=htmlunit
    networks:
      - scanner-net
    restart: unless-stopped
    labels:
      hunter.role: web-scanner

  # ─────────────────────────────────────────────
  # NETWORK SCANNER — Nmap
  # Handles: port scan, service detection, OS fingerprint
  # ─────────────────────────────────────────────
  nmap:
    image: instrumentisto/nmap:latest
    container_name: hunter-nmap
    volumes:
      - results:/results
    networks:
      - scanner-net
    # Stays stopped — orchestrator runs it on demand
    entrypoint: ["tail", "-f", "/dev/null"]
    cap_add:
      - NET_ADMIN
      - NET_RAW
    labels:
      hunter.role: network-scanner

  # ─────────────────────────────────────────────
  # DEPENDENCY SCANNER — Trivy
  # Handles: CVE lookup, outdated packages, misconfigs
  # ─────────────────────────────────────────────
  trivy:
    image: aquasec/trivy:latest
    container_name: hunter-trivy
    volumes:
      - results:/results
      - /tmp/trivy-cache:/root/.cache/trivy
    networks:
      - scanner-net
    entrypoint: ["tail", "-f", "/dev/null"]
    labels:
      hunter.role: dependency-scanner

  # ─────────────────────────────────────────────
  # SAST SCANNER — Semgrep
  # Handles: code patterns, secrets, weak crypto
  # ─────────────────────────────────────────────
  semgrep:
    image: returntocorp/semgrep:latest
    container_name: hunter-semgrep
    volumes:
      - results:/results
    networks:
      - scanner-net
    entrypoint: ["tail", "-f", "/dev/null"]
    labels:
      hunter.role: sast-scanner
