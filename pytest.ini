[pytest]
# ── Markers ───────────────────────────────────────────────────────────────────
markers =
    fast:      Quick tests (< 5s). Run on every save.
    slow:      Training-loop tests (30–200 episodes). Run pre-commit.
    benchmark: pytest-benchmark latency tests. Run with --benchmark-autosave.

# ── Default options ───────────────────────────────────────────────────────────
addopts =
    --tb=short
    -q

# ── Benchmark defaults ────────────────────────────────────────────────────────
# NOTE: pytest-benchmark settings are passed via CLI flags:
#   --benchmark-storage=.benchmarks
#   --benchmark-min-rounds=20
#   --benchmark-warmup=on
#   --benchmark-disable-gc
#   --benchmark-sort=mean
